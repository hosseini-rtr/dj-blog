version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: blog_db
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: local_pass_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile
    container_name: blog_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../..:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_ENV=local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  celery:
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile
    container_name: blog_celery
    command: celery -A core worker -l info
    volumes:
      - ../..:/app
    environment:
      - DJANGO_ENV=local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
