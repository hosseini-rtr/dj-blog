{% load static %} {% load i18n %}

<nav class="navbar navbar-expand-lg navbar-light bg-dark text-light shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold display-1" href="{% url 'home' %}">
      <img src="{% static 'assets/logo-white.svg' %}" height="60" alt="Logo" />
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}"
            >{% trans "Home" %}</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'blog:home' %}"
            >{% trans "Blog" %}</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}#about">{% trans "About" %}</a>
        </li>
        <li class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle"
            href="#"
            data-bs-toggle="dropdown"
          >
            {% if LANGUAGE_CODE == 'fa' %}🇮🇷 فارسی {% elif LANGUAGE_CODE == 'en'%}🇬🇧 English {% else %}🇮🇹 Italiano{% endif %}
          </a>

          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" href="/fa{{ request.path|slice:'3:' }}"
                >🇮🇷 فارسی</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="/en{{ request.path|slice:'3:' }}"
                >🇬🇧 English</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="/it{{ request.path|slice:'3:' }}"
                >🇮🇹 Italiano</a
              >
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
